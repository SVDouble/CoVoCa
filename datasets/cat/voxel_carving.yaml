schema: gs.voxel_carving.config.v1
name: cat_visual_hull

paths:
  calibration_result: local/datasets/cat/calibration_result.yaml
  masks_dir: local/datasets/cat/masks
  output_dir: local/outputs/cat

volume:
  min_m: [0.02, -0.18, 0.0]
  max_m: [0.15, -0.03, 0.15]
  voxel_size_m: 0.00125

carving:
  sample_policy: center
  outside_image_policy: keep
  foreground_threshold: 128

export:
  format: ply
  occupied_points_file: visual_hull_points.ply
  occupied_mesh_file: visual_hull_voxels.ply

color:
  method: weighted_average
  occupied_points_file: visual_hull_points_color.ply
  occupied_mesh_file: visual_hull_voxels_color.ply
